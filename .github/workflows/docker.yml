      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Push ingestion
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: ingestion/
      #     push: true
      #     tags: ghcr.io/${{ github.repository_owner }}/daily-patch-ingestion:latest

  build-scorer:
    name: Build scorer image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build scorer
        uses: docker/build-push-action@v6
        with:
          context: scorer/
          push: false
          tags: daily-patch/scorer:${{ github.sha }}

      # --- Extension point: push to ghcr.io ---
      #
      # - uses: docker/login-action@v3
      #   with:
      #     registry: ghcr.io
      #     username: ${{ github.actor }}
      #     password: ${{ secrets.GITHUB_TOKEN }}
      #
      # - name: Push scorer
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: scorer/
      #     push: true
      #     tags: ghcr.io/${{ github.repository_owner }}/daily-patch-scorer:latest

  build-generator:
    name: Build generator image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build generator
        uses: docker/build-push-action@v6
        with:
          context: generator/
          push: false
          tags: daily-patch/generator:${{ github.sha }}

      # --- Extension point: push to ghcr.io ---
